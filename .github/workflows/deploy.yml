name: Deploy Node.js project to function app

on:
  push:
    branches:
      - "master"

env:
  AZURE_FUNCTIONAPP_NAME: gapi
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "."
  NODE_VERSION: "22.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v4 # Updated to v4 for better performance

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Prepare Source and Prisma"
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          npm install # We need this only to run Prisma locally on the runner
          npx prisma generate
          npx prisma migrate deploy
          # We DO NOT run 'npm prune' or keep node_modules for the zip
          rm -rf node_modules 
          popd
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: "Run Azure Functions Action"
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          # ENABLE REMOTE BUILD BELOW:
          scm-do-build-during-deployment: true
          enable-oryx-build: true
