name: Deploy Node.js project to Azure Function App

on:
  push:
    branches: ["master"]

env:
  AZURE_FUNCTIONAPP_NAME: "sikosoft2"
  RESOURCE_GROUP: "SS"
  NODE_VERSION: "22.x"
  AZURE_SUBSCRIPTION_ID: "c92be084-7e43-4496-ae1f-ae27b75d6318"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Install, migrate, and build"
        run: |
          npm ci
          npx prisma migrate deploy
          npx prisma generate
          npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: "Prepare production node_modules"
        run: |
          npm prune --production

          # Remove Prisma engine binaries for non-Linux platforms
          find node_modules -name "query-engine-windows*" -delete
          find node_modules -name "query-engine-darwin*" -delete
          find node_modules -name "libquery_engine-darwin*" -delete
          find node_modules -name "libquery_engine-windows*" -delete

          # Remove everything from node_modules except the packages that must
          # exist on disk at runtime (native binaries / Azure host injection).
          # Everything else was bundled into dist/ by tsup, including transitive
          # deps — so we drop them here too, not just the top-level packages.
          find node_modules -maxdepth 1 -mindepth 1 \
            ! -name "argon2" \
            ! -name ".prisma" \
            ! -name "@prisma" \
            ! -name "@azure" \
            -exec rm -rf {} \;
          find node_modules/@azure -maxdepth 1 -mindepth 1 \
            ! -name "functions" \
            -exec rm -rf {} \;
          find node_modules/@prisma -maxdepth 1 -mindepth 1 \
            ! -name "client" \
            ! -name "engines-version" \
            -exec rm -rf {} \;

      - name: "Size audit"
        run: |
          echo "=== node_modules top 20 ==="
          du -sh node_modules/*/ 2>/dev/null | sort -hr | head -20
          echo "=== dist/ ==="
          du -sh dist/

      - name: "Create deployment zip"
        run: |
          zip -r deploy.zip dist/ node_modules/ host.json package.json
          echo "=== Final zip size ==="
          du -sh deploy.zip

      - name: "Deploy to Azure Functions"
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: deploy.zip
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: false
