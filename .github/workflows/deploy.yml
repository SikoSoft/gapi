name: Deploy Node.js project to Azure Function App

on:
  push:
    branches: ["master"]

env:
  AZURE_FUNCTIONAPP_NAME: "sikosoft2"
  RESOURCE_GROUP: "SS"
  NODE_VERSION: "22.x"
  AZURE_SUBSCRIPTION_ID: "c92be084-7e43-4496-ae1f-ae27b75d6318"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Install, migrate, and build"
        run: |
          npm ci
          npx prisma migrate deploy
          npx prisma generate
          npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: "Prepare production node_modules"
        run: |
          cp -r node_modules/.prisma /tmp/prisma-generated
          npm prune --production
          cp -r /tmp/prisma-generated node_modules/.prisma

          find node_modules -name "query-engine-windows*" -delete
          find node_modules -name "query-engine-darwin*" -delete
          find node_modules -name "libquery_engine-darwin*" -delete
          find node_modules -name "libquery_engine-windows*" -delete

          node << 'SCRIPT'
          const fs = require('fs');
          const path = require('path');
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));

          function getAllDeps(pkgName, visited = new Set()) {
            if (visited.has(pkgName)) return visited;
            visited.add(pkgName);
            const key = 'node_modules/' + pkgName;
            const pkg = lock.packages?.[key];
            if (!pkg) return visited;
            for (const dep of Object.keys(pkg.dependencies || {})) {
              getAllDeps(dep, visited);
            }
            return visited;
          }

          const needed = new Set(['.prisma']);
          for (const pkg of ['argon2', '@prisma/client', '@azure/functions']) {
            getAllDeps(pkg, needed);
          }

          const nmDir = 'node_modules';
          for (const entry of fs.readdirSync(nmDir)) {
            if (entry.startsWith('@')) {
              const scopeDir = path.join(nmDir, entry);
              for (const pkg of fs.readdirSync(scopeDir)) {
                const full = entry + '/' + pkg;
                if (!needed.has(full)) {
                  fs.rmSync(path.join(scopeDir, pkg), { recursive: true, force: true });
                }
              }
            } else if (!needed.has(entry)) {
              fs.rmSync(path.join(nmDir, entry), { recursive: true, force: true });
            }
          }

          console.log('Kept:', [...needed].sort().join(', '));
          SCRIPT

      - name: "Size audit"
        run: |
          echo "=== node_modules top 20 ==="
          du -sh node_modules/*/ 2>/dev/null | sort -hr | head -20
          echo "=== dist/ ==="
          du -sh dist/

      - name: "Create deployment zip"
        run: |
          zip -r deploy.zip dist/ node_modules/ host.json package.json
          echo "=== Final zip size ==="
          du -sh deploy.zip
          echo "=== @phc in zip ==="
          unzip -l deploy.zip | grep "@phc" | head -10

      - name: "Deploy to Azure Functions"
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: deploy.zip
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: false
