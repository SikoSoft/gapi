name: Deploy Node.js project to Azure Function App

on:
  push:
    branches: ["master"]

env:
  AZURE_FUNCTIONAPP_NAME: "sikosoft2"
  RESOURCE_GROUP: "SS"
  NODE_VERSION: "22.x"
  AZURE_SUBSCRIPTION_ID: "c92be084-7e43-4496-ae1f-ae27b75d6318"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Install, migrate, and build"
        run: |
          npm ci
          npx prisma migrate deploy
          npx prisma generate
          npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: "Prepare production node_modules"
        run: |
          npm prune --production

          # Remove Prisma engine binaries for non-Linux platforms
          find node_modules -name "query-engine-windows*" -delete
          find node_modules -name "query-engine-darwin*" -delete
          find node_modules -name "libquery_engine-darwin*" -delete
          find node_modules -name "libquery_engine-windows*" -delete

          # Remove packages that tsup has bundled into dist/ — they are not
          # needed at runtime and are the primary source of zip bloat.
          # googleapis alone is ~194MB; after tree-shaking it is a few KB in dist/.
          node -e "
            const pkg = require('./package.json');
            // Keep packages that are external to the bundle (must exist in node_modules at runtime)
            const nativePkgs = new Set(['argon2', '@prisma/client', '@azure/functions']);
            const {execSync} = require('child_process');
            for (const name of Object.keys(pkg.dependencies)) {
              if (!nativePkgs.has(name)) {
                try { execSync('rm -rf node_modules/' + name, {stdio: 'inherit'}); } catch {}
              }
            }
          "

      - name: "Size audit"
        run: |
          echo "=== node_modules top 20 ==="
          du -sh node_modules/*/ 2>/dev/null | sort -hr | head -20
          echo "=== dist/ ==="
          du -sh dist/

      - name: "Create deployment zip"
        run: |
          zip -r deploy.zip dist/ node_modules/ host.json package.json
          echo "=== Final zip size ==="
          du -sh deploy.zip

      - name: "Login to Azure"
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: "Configure app settings"
        run: |
          az account set --subscription ${{ env.AZURE_SUBSCRIPTION_ID }}
          az functionapp config appsettings set \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings WEBSITE_RUN_FROM_PACKAGE="1"

      - name: "Deploy zip"
        run: |
          az functionapp deployment source config-zip \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --src deploy.zip \
            --build-remote false \
            --timeout 600

      - name: "Restart function app"
        run: |
          az functionapp restart \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}
