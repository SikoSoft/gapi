name: Deploy Node.js project to Azure Function App

on:
  push:
    branches: ["master"]

env:
  AZURE_FUNCTIONAPP_NAME: "sikosoft2"
  RESOURCE_GROUP: "SS"
  NODE_VERSION: "22.x"
  AZURE_SUBSCRIPTION_ID: "c92be084-7e43-4496-ae1f-ae27b75d6318"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Aggressive Prisma Slimming"
        run: |
          # 1. Standard install
          npm install
          npx prisma migrate deploy

          # 2. Generate ONLY the engine for Azure Linux (Debian based)
          export PRISMA_CLI_BINARY_TARGETS="debian-openssl-3.0.x"
          npx prisma generate

          # 3. Prune dev dependencies
          npm prune --production

          # 4. NUCLEAR DELETE of unused Prisma binaries
          # This usually cuts 100MB+ off the size
          find node_modules/@prisma/engines -type f ! -name "*debian-openssl-3.0.x*" -delete
          find node_modules/prisma -type f -name "query-engine-*" -delete

          # 5. Remove any other heavy files not needed for production
          rm -rf node_modules/.cache
          rm -rf node_modules/@types
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: "Zip Application"
        run: |
          # The -9 flag forces maximum compression
          zip -9 -r deploy.zip . -x "*.git*"
          echo "NEW ZIP SIZE:"
          du -sh deploy.zip

      - name: "Login to Azure"
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: "Deploy"
        run: |
          az account set --subscription ${{ env.AZURE_SUBSCRIPTION_ID }}

          # Ensure we are in the correct mode for local zips
          az functionapp config appsettings set --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings WEBSITE_RUN_FROM_PACKAGE="1"

          echo "Starting deployment..."
          az functionapp deployment source config-zip \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --src deploy.zip \
            --build-remote false

      - name: "Manual Trigger Sync"
        run: |
          az functionapp deployment slot sync-triggers \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}
