name: Deploy Node.js project to Azure Function App

on:
  push:
    branches: ["master"]

env:
  AZURE_FUNCTIONAPP_NAME: "sikosoft2"
  RESOURCE_GROUP: "SS"
  NODE_VERSION: "22.x"
  AZURE_SUBSCRIPTION_ID: "c92be084-7e43-4496-ae1f-ae27b75d6318"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Full Build and Prisma Optimization"
        run: |
          npm install
          npx prisma migrate deploy

          # Force Prisma to generate only the Linux engine to save ~50MB
          export PRISMA_CLI_BINARY_TARGETS="debian-openssl-3.0.x"
          npx prisma generate

          # Prune dev dependencies
          npm prune --production

          # Delete heavy Prisma engines that aren't for Linux
          # This is the "Magic" step to get under the 100MB limit
          find node_modules/@prisma/engines -name "*windows*" -delete
          find node_modules/@prisma/engines -name "*darwin*" -delete
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: "Zip Application"
        run: |
          zip -r deploy.zip . -x "*.git*"
          echo "ZIP SIZE:"
          du -sh deploy.zip

      - name: "Login to Azure"
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: "Fix Config and Deploy"
        run: |
          az account set --subscription ${{ env.AZURE_SUBSCRIPTION_ID }}

          # Ensure the app is set to run from a local package (removes the 'Bad Request' conflict)
          az functionapp config appsettings set --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings WEBSITE_RUN_FROM_PACKAGE="1"

          echo "Starting fresh deployment..."
          az functionapp deployment source config-zip \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --src deploy.zip \
            --build-remote false

      - name: "Manual Trigger Sync"
        run: |
          az functionapp deployment slot sync-triggers \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}
