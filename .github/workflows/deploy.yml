name: Deploy Node.js project to Azure Function App

on:
  push:
    branches: ["master"]

env:
  AZURE_FUNCTIONAPP_NAME: "sikosoft2"
  RESOURCE_GROUP: "SS"
  NODE_VERSION: "22.x"
  AZURE_SUBSCRIPTION_ID: "c92be084-7e43-4496-ae1f-ae27b75d6318"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Install and Build"
        run: |
          npm install
          npx prisma migrate deploy
          npx prisma generate
          npm prune --production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: "Size Audit (Debug)"
        # This will show us exactly where the 135MB is hiding
        run: |
          echo "--- Top 10 Largest Folders ---"
          du -sh ./* | sort -hr | head -n 10
          echo "--- Prisma Engine Location Search ---"
          find . -name "query-engine*" -exec du -sh {} +

      - name: "Aggressive Cleanup"
        # We target the common 'hidden' Prisma engine spots
        run: |
          # Delete all Prisma engines except the Linux one
          find . -name "query-engine-windows.exe" -delete
          find . -name "query-engine-darwin*" -delete
          find . -name "libquery_engine-darwin*" -delete

          # Delete the CLI binaries which are NOT needed at runtime
          rm -rf node_modules/prisma
          rm -rf node_modules/@prisma/engines

          # Remove telemetry and cache
          rm -rf node_modules/.cache

          # If you have a 'dist' or 'build' folder, ensure you aren't zipping both src and dist
          # (Optional: rm -rf src if you only need dist)

      - name: "Zip Application"
        # We explicitly exclude .git and node_modules/.cache to save space
        run: |
          zip -9 -r deploy.zip . -x "*.git*" "node_modules/.cache/*"
          echo "FINAL ZIP SIZE:"
          du -sh deploy.zip

      - name: "Login to Azure"
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: "Deploy"
        run: |
          az account set --subscription ${{ env.AZURE_SUBSCRIPTION_ID }}

          # Force the app to use the local zip deployment mode
          az functionapp config appsettings set --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings WEBSITE_RUN_FROM_PACKAGE="1"

          echo "Starting deployment..."
          az functionapp deployment source config-zip \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --src deploy.zip \
            --build-remote false

      - name: "Manual Trigger Sync"
        run: |
          az functionapp deployment slot sync-triggers \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}
