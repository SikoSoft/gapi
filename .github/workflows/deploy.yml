name: Deploy Node.js project to Azure Function App

on:
  push:
    branches: ["master"]

env:
  AZURE_FUNCTIONAPP_NAME: "sikosoft2"
  RESOURCE_GROUP: "SS"
  NODE_VERSION: "22.x"
  AZURE_SUBSCRIPTION_ID: "c92be084-7e43-4496-ae1f-ae27b75d6318"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Full Build on GitHub"
        run: |
          npm install
          npx prisma migrate deploy
          npx prisma generate
          npm prune --production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: "Zip Application"
        run: zip -r deploy.zip . -x "*.git*"

      - name: "Login to Azure"
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: "Nuclear Reset and Deploy"
        run: |
          az account set --subscription ${{ env.AZURE_SUBSCRIPTION_ID }}

          echo "Stopping app to clear SCM locks..."
          az functionapp stop --name ${{ env.AZURE_FUNCTIONAPP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}

          # This specifically clears the 'stuck' deployment record you see in the error
          echo "Cleaning deployment cache..."
          az functionapp deployment source delete --name ${{ env.AZURE_FUNCTIONAPP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}

          echo "Starting fresh deployment (Build-Remote: False)..."
          az functionapp deployment source config-zip \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --src deploy.zip \
            --build-remote false

          echo "Restarting app..."
          az functionapp start --name ${{ env.AZURE_FUNCTIONAPP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}

      - name: "Manual Trigger Sync"
        run: |
          az functionapp deployment slot sync-triggers \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}
