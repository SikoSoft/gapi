name: Deploy Node.js project to function app

on:
  push:
    branches:
      - "master"

env:
  AZURE_FUNCTIONAPP_NAME: gapi
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "."
  NODE_VERSION: "22.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Prepare Source and Prisma"
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          npm install
          npx prisma generate
          npx prisma migrate deploy

          # Remove node_modules so Azure can build its own (Remote Build)
          rm -rf node_modules

          # CRITICAL: Ensure the Prisma engine has execute permissions 
          # before it gets zipped, otherwise the zip extraction on Azure can fail.
          if [ -d "node_modules/.prisma" ]; then
            chmod -R 755 node_modules/.prisma
          fi

          popd
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: "Run Azure Functions Action"
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          # The holy trinity of Remote Build settings:
          scm-do-build-during-deployment: true
          enable-oryx-build: true
          remote-build: true
